<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Armyknife Tools</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Armyknife Tools</h1>
        <p>実行したいツールを選んでください</p>
      </header>
      <section class="tool-controls" aria-label="tool controls">
        <input
          id="tool-search"
          class="tool-search"
          type="search"
          placeholder="ツールを検索..."
          autocomplete="off"
        />
      </section>
      <section id="tool-list" class="tool-list" aria-label="tool list"></section>
      <section class="result">
        <div class="result-header">
          <h2>結果</h2>
          <div class="result-actions">
            <button id="copy-result" class="result-action" type="button">コピー</button>
            <button id="clear-result" class="result-action" type="button">クリア</button>
          </div>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="result" class="result-body" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
